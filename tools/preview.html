<!doctype html>
<!-- Preview 3D offline: render model GLB thật để NHÌN trước khi viết vào world-spec.
     Chạy: node tools/preview.js (tự viết preview-config.json rồi screenshot bằng headless Edge) -->
<html><head><meta charset="utf-8"><style>body{margin:0}</style>
<script type="importmap">
{"imports":{"three":"../node_modules/three/build/three.module.js","three/addons/":"../node_modules/three/examples/jsm/"}}
</script>
</head><body>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const cfg = await fetch('./preview-config.json').then((r) => r.json());
const scene = new THREE.Scene();
scene.background = new THREE.Color('#a8c8e8');
const cam = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
cam.position.set(...(cfg.camera ?? [7, 6, 9]));
cam.lookAt(...(cfg.lookAt ?? [0, 1, 0]));

scene.add(new THREE.HemisphereLight('#cfe2ff', '#6a7a58', 1.4));
const dir = new THREE.DirectionalLight('#ffdfae', 2.0);
dir.position.set(8, 14, 6);
scene.add(dir);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: '#5d8a4e' })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);
scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x88aa88));

const loader = new GLTFLoader();
await Promise.all(cfg.objects.map(async (o) => {
  const gltf = await loader.loadAsync('../src/assets/game3d/models/' + o.path);
  const m = gltf.scene;
  m.position.set(...o.pos);
  if (o.rotY) m.rotation.y = o.rotY;
  m.scale.setScalar(o.scale ?? 1);
  scene.add(m);
}));

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(900, 900);
document.body.appendChild(renderer.domElement);
renderer.render(scene, cam);
document.title = 'PREVIEW_READY';
</script></body></html>
