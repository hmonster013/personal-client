<footer class="footer">
  <div class="footer__body">
    <!-- Left: Logo/Brand & Credits -->
    <div class="footer__left">
      <div class="footer__brand" (click)="goToHome()">
        <img src="assets/img.png" alt="de013" class="pixelated" style="width: 20px; height: 20px; border: 1px solid var(--gold);" />
        <span class="footer__brand-text">de013</span>
      </div>
      <div class="footer__credits">
        Assets: <a href="https://kenney.nl" target="_blank" rel="noopener noreferrer">Kenney.nl</a> (CC0)
      </div>
    </div>

    <!-- Center: Copyright -->
    <div class="footer__copyright">
      <p>&copy; {{ currentYear }} DE013 QUEST. All rights reserved.</p>
    </div>

    <!-- Right: Social Links & Easter Egg Cat -->
    <div class="footer__right">
      <div class="footer__social">
        <ul class="footer__social__list">
          <li class="footer__social__item">
            <a [href]="linkedInLink" target="_blank" class="rpg-btn" title="LinkedIn" style="padding: 6px; box-shadow: none; border: 1px solid var(--ui-border);">
              <i class="fab fa-linkedin"></i>
            </a>
          </li>
          <li class="footer__social__item">
            <a [href]="telegramLink" target="_blank" class="rpg-btn" title="Telegram" style="padding: 6px; box-shadow: none; border: 1px solid var(--ui-border);">
              <i class="fab fa-telegram"></i>
            </a>
          </li>
          <li class="footer__social__item">
            <a [href]="facebookLink" target="_blank" class="rpg-btn" title="Facebook" style="padding: 6px; box-shadow: none; border: 1px solid var(--ui-border);">
              <i class="fab fa-facebook"></i>
            </a>
          </li>
          <li class="footer__social__item">
            <a [href]="githubLink" target="_blank" class="rpg-btn" title="GitHub" style="padding: 6px; box-shadow: none; border: 1px solid var(--ui-border);">
              <i class="fab fa-github"></i>
            </a>
          </li>
        </ul>
      </div>

      <!-- Easter Egg: Pixel Cat -->
      <div class="pixel-cat" title="Meow! I'm DE013's helper 🐈">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Body -->
          <rect x="6" y="12" width="10" height="10" fill="#EF7D57" />
          <rect x="8" y="10" width="8" height="2" fill="#EF7D57" />
          <!-- Head -->
          <rect x="8" y="4" width="8" height="6" fill="#EF7D57" />
          <!-- Ears -->
          <rect x="8" y="2" width="2" height="2" fill="#3E2731" />
          <rect x="14" y="2" width="2" height="2" fill="#3E2731" />
          <!-- Eyes -->
          <rect x="9" y="6" width="2" height="1" fill="#FFD75E" />
          <rect x="13" y="6" width="2" height="1" fill="#FFD75E" />
          <!-- Nose -->
          <rect x="11" y="8" width="2" height="1" fill="#3E2731" />
          <!-- Tail -->
          <rect x="16" y="12" width="2" height="6" fill="#EF7D57" />
          <!-- Feet -->
          <rect x="7" y="22" width="2" height="2" fill="#3E2731" />
          <rect x="13" y="22" width="2" height="2" fill="#3E2731" />
        </svg>
        <div class="cat-bubble">Meow!</div>
      </div>
    </div>
  </div>
</footer>
