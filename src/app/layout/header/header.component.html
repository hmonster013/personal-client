<header>
  <div class="header__body">
    <div class="header__icon" (click)="goToHome()" style="cursor: pointer; display: flex; align-items: center; gap: var(--spacing-sm);">
      <img src="assets/img.png" alt="DE013 Logo" class="pixelated" style="width: 24px; height: 24px; border: 1px solid var(--gold);" />
      <span style="font-family: var(--font-pixel); color: var(--gold); font-size: 1.5rem; text-transform: uppercase;">de013</span>
    </div>

    <div class="header__menu">
      <nav>
        <ul>
          <li routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}">
            <a routerLink="/">
              <span class="active-cursor">▸</span>Home
            </a>
          </li>
          <li routerLinkActive="is-active">
            <a routerLink="/about">
              <span class="active-cursor">▸</span>About
            </a>
          </li>
          <li routerLinkActive="is-active">
            <a routerLink="/blogs">
              <span class="active-cursor">▸</span>Blog
            </a>
          </li>
          
          <li class="header__icon header__icon--github">
            <a [href]="githubLink" target="_blank" class="rpg-btn" style="padding: 6px; box-shadow: none; border: 1px solid var(--ui-border);">
              <i class="fab fa-github"></i>
            </a>
          </li>
          <li class="header__icon header__icon--theme">
            <button (click)="toggleTheme()" class="rpg-btn" style="padding: 6px; box-shadow: none; border: 1px solid var(--ui-border);">
              <i class="fas" [ngClass]="isDarkMode ? 'fa-moon' : 'fa-sun'"></i>
            </button>
          </li>
          <li class="header__icon header__icon--menu" *ngIf="isMobile">
            <button (click)="toggleMenu()" class="rpg-btn" style="padding: 6px; box-shadow: none; border: 1px solid var(--ui-border);">
              <i class="fas fa-bars"></i>
            </button>
          </li>
        </ul>
      </nav>

      <button (click)="playGame()" class="rpg-btn" style="margin-left: var(--spacing-lg);">
        🎮 Play game
      </button>
    </div>
  </div>

  <!-- Side Menu (Mobile) -->
  <div id="sideMenu" class="side-menu rpg-panel" style="--rpg-panel-bg: var(--ui-parchment); --rpg-panel-color: var(--text-ink); margin: 0; box-shadow: -4px 0 0 0 var(--ui-border-dark);">
    <div class="side-menu__header" style="border-bottom: 3px double var(--ui-border); padding: var(--spacing-md) var(--spacing-lg);">
      <div class="side-menu__logo" style="display: flex; align-items: center; gap: var(--spacing-sm); font-family: var(--font-pixel); font-weight: bold; font-size: 1.25rem;">
        <img src="assets/img.png" alt="de013" class="pixelated" style="width: 20px; height: 20px; border: 1px solid var(--ui-border);" />
        <span>de013</span>
      </div>
      <button id="closeMenuBtn" (click)="closeMenu()" class="rpg-btn rpg-btn--danger" style="padding: 4px 8px; font-size: 0.875rem;">
        ✕
      </button>
    </div>

    <nav class="side-menu__nav" style="padding: var(--spacing-lg) 0;">
      <ul style="flex-direction: column; align-items: stretch; height: auto;">
        <li routerLinkActive="is-active" [routerLinkActiveOptions]="{exact: true}" style="margin: 0;">
          <a routerLink="/" (click)="closeMenu()" style="display: flex; align-items: center; padding: var(--spacing-md) var(--spacing-lg); font-family: var(--font-pixel); font-size: 1.25rem; color: var(--text-ink);">
            <span class="active-cursor">▸</span>Home
          </a>
        </li>
        <li routerLinkActive="is-active" style="margin: 0;">
          <a routerLink="/about" (click)="closeMenu()" style="display: flex; align-items: center; padding: var(--spacing-md) var(--spacing-lg); font-family: var(--font-pixel); font-size: 1.25rem; color: var(--text-ink);">
            <span class="active-cursor">▸</span>About
          </a>
        </li>
        <li routerLinkActive="is-active" style="margin: 0;">
          <a routerLink="/blogs" (click)="closeMenu()" style="display: flex; align-items: center; padding: var(--spacing-md) var(--spacing-lg); font-family: var(--font-pixel); font-size: 1.25rem; color: var(--text-ink);">
            <span class="active-cursor">▸</span>Blog
          </a>
        </li>
      </ul>
    </nav>

    <div class="side-menu__footer" style="margin-top: auto; border-top: 3px double var(--ui-border); padding: var(--spacing-lg);">
      <div class="side-menu__social" style="display: flex; justify-content: center; gap: var(--spacing-md); margin-bottom: var(--spacing-md);">
        <a [href]="githubLink" target="_blank" class="rpg-btn" style="padding: 8px;">
          <i class="fab fa-github"></i>
        </a>
        <button (click)="toggleTheme()" class="rpg-btn" style="padding: 8px;">
          <i class="fas" [ngClass]="isDarkMode ? 'fa-moon' : 'fa-sun'"></i>
        </button>
      </div>
      <button (click)="playGame(); closeMenu()" class="rpg-btn" style="width: 100%;">
        🎮 Play game
      </button>
    </div>
  </div>

  <!-- Overlay -->
  <div id="menuOverlay" class="menu-overlay" (click)="closeMenu()"></div>
</header>
